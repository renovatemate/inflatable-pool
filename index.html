<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Site Title</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #222;
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid #eee;
      padding: 15px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
    }

    nav {
      margin-top: 10px;
    }

    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: #333;
      font-size: 14px;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h2 {
      font-size: 24px;
    }

    p {
      line-height: 1.6;
      font-size: 16px;
    }

    footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid #eee;
      font-size: 13px;
      color: #777;
      margin-top: 40px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Your Website Name</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <div class="container">
    <h2>Welcome</h2>
    <p>
      This is your clean, simple website designed for readability and AdSense approval.
    </p>
  </div>

  <footer>
    © 2026 Your Website. All rights reserved.
  </footer>

</body>
</html>
